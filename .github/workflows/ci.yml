name: CI

on: [pull_request]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: '0'
    - uses: wagoid/commitlint-github-action@v6.2.1

  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: '0'
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
    - run: uv run pytest --cov=fcmeans

  linter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: '0'
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
    - run: |
        uv run black . --line-length=79 --check
        uv run isort . -c
        uv run flake8 --exclude ".*"
