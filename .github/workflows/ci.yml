name: CI

on: [pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
    - run: uv run pytest --cov=fcmeans

  linter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
    - run: |
        uv run black . --line-length=79
        uv run isort **/*.py -c
        uv run flake8 --exclude ".*"
